# ============     GEE-Biophys  ================
# EO4Change Group 4 — Central Portugal AOI (fire/recovery test region)
# AOI: ~34 × 24 km bbox in central Portugal (Coimbra / Pedrógão Grande area)
# ==============================================

spatial:
  type: geojson
  geojson_path: area_pt.geojson    # path relative to data/ (used when type=geojson)
  geojson_clip: true
  region_name: portugal-aoi        # no spaces; hyphens ok
  # Fallback bbox (used if type: bbox):
  # bbox: [-8.45, 39.80, -8.05, 40.02]  # [minLon, minLat, maxLon, maxLat]

temporal:
  start: "2018-01-02"
  end:   "2024-01-01"
  cadence:
    type: fixed                   # options: fixed, seasons
    interval: monthly             # fixed options: monthly, biweekly, quarterly, annual
  reference_date:  "2017-06-17"  # vertical line on time-series plots (null = hide)
  reference_label: "Pedrógão Grande fire"

# Multi-year May–Aug seasonal composites for early-vs-recent change maps
# (vision.md Milestones 1 & 2). Early window starts at 2017 because the
# Cloud Score Plus collection only covers 2017-04 onwards.
comparison:
  # S2_SR_HARMONIZED + Cloud Score Plus both start 2017-03-28, so pre-fire
  # must be within 2017 — April–May is just before the June 17 fire.
  prefire_years:  [2017, 2017]  # pre-fire reference — same year as fire, before it
  prefire_months: [4, 6]        # Apr (4) to Jun (6), exclusive end: captures spring greenness before June 17 fire
  postfire_years: [2017, 2017]  # fire damage baseline — summer 2017 (fire scar)
  recent_years:   [2022, 2025]
  months:         [5, 9]        # May (5) to Sep (9), exclusive on end — used for postfire + recent

# Pre-fire forest mask using Dynamic World tree probability.
# Pixels with tree probability >= threshold in the baseline year are kept;
# all others (cropland, built-up, water, etc.) are excluded from the
# recovery assessment. Using 2016 avoids the post-fire artefact that would
# affect a 2017 classification.
forest_mask:
  enabled: true
  source: dynamic_world          # GOOGLE/DYNAMICWORLD/V1
  year: 2016                     # pre-fire baseline year
  months: [5, 9]                 # May–Aug summer window
  tree_prob_threshold: 0.60      # DW 'trees' probability >= this → forest pixel


classification:
  # ── RRI-based recovery class thresholds ───────────────────────────────────
  # RRI = (recent_NDVI − postfire_NDVI) / (prefire_NDVI − postfire_NDVI)
  #   1.0 = fully back to pre-fire;  0 = at post-fire level;  <0 = worse
  rri_good_threshold:    0.80   # RRI ≥ this → recovering well  (≥80% of pre-fire NDVI restored)
  rri_low_threshold:     0.30   # RRI < this → failed           (<30% of pre-fire NDVI restored)
  rri_min_denominator:   0.10   # min (prefire − postfire) NDVI required to trust RRI
  # ── Burn severity mask (restricts RRI analysis to fire-affected pixels) ────
  burn_severity_threshold: 0.10  # dNBR (prefire − postfire NBR) ≥ this → fire-affected
                                  # USGS low-severity floor; below this = stable/unburned forest
  # ── Secondary canopy-quality check (Class 1 only) ─────────────────────────
  ndre_good_threshold:   0.18   # NDRE ≥ this confirms woody canopy, not just herbaceous green-up
  # ── Guard-flag thresholds ─────────────────────────────────────────────────
  ndvi_change_good_threshold: 0.09  # used in mixed-signal guard flag
  bsi_high_threshold:    0.09   # persistent bare soil → mixed-signal or failed flag
  ndwi_water_threshold:  0.15   # likely water or non-vegetation pixel
  disturbance_threshold: 0.09   # NBR_change < -this suggests new disturbance

# NDMI 
# NBR 

failed_diagnostics:
  enabled: false
  n_examples: 5
  radius_m: 40

sensitivity_analysis:
  enabled: true
  burn_severity_threshold_values: [0.05, 0.075, 0.10, 0.125, 0.15]
  rri_good_threshold_values:      [0.70, 0.75, 0.80, 0.85, 0.90]
  rri_low_threshold_values:       [0.20, 0.25, 0.30, 0.35, 0.40]

variables:
  model: s2biophys                # options: s2biophys, sl2p
  variable: [laie, fapar, fcover] # list or single string; all three biophys outputs

export:
  destination: drive
  collection_path: "EO4Change/portugal"
  project_id: "daring-pier-498809-k0"
  crs: "EPSG:32629"               # UTM zone 29N — best accuracy for central Portugal
  scale: 100                # metres per pixel
  max_pixels: 100_000_000_000

options:
  max_cloud_cover: 50
  csplus_band: cs                 # options: cs, cs_cdf
  cs_plus_threshold: 0.70
  clip_min_max: true

version: "v02"
