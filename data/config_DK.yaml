# ============     GEE-Biophys  ================
# EO4Change Group 4 — Rugballegård Skov, Denmark
# ==============================================

spatial:
  type: geojson                   # options: bbox, geojson
  geojson_path: area_dk.geojson    # path relative to this file (used when type=geojson)
  geojson_clip: true              # clip output rasters to the polygon boundary
  region_name: rugballegaard-skov # no spaces; hyphens ok
  # Fallback bbox (used if type: bbox):
  # bbox: [9.767, 55.858, 9.823, 55.875]  # [minLon, minLat, maxLon, maxLat]

temporal:
  start: "2018-01-02"
  end:   "2024-01-01"
  cadence:
    type: fixed                   # options: fixed, seasons
    interval: monthly             # fixed options: monthly, biweekly, quarterly, annual
  reference_date:  "2022-04-01"   # Rugballegård planting date
  reference_label: "Planting T₀"

# Multi-year May–Aug seasonal composites for early-vs-recent change maps.
# Early = pre-planting baseline; recent = post-planting growing seasons.
comparison:
  early_years:  [2018, 2020]    # 3 full growing seasons before planting
  recent_years: [2022, 2023]    # first two post-planting summers
  months:       [5, 9]          # May (5) to Sep (9), exclusive on end

variables:
  model: s2biophys                # options: s2biophys, sl2p
  variable: [laie, fapar, fcover] # list or single string; all three biophys outputs

export:
  destination: drive              # options: asset, drive, gcs  (drive needs no asset path)
  collection_path: "EO4Change/rugballegaard"   # folder name on Google Drive
  project_id: "eo4change-ex"      # YOUR GEE project id (must match ee.Initialize)
  crs: "EPSG:32632"               # UTM zone 32N — best accuracy for Denmark
                                  # (LOCAL_UTM is not a valid value; use explicit EPSG)
  scale: 100                      # metres per pixel (PositiveInt)
  max_pixels: 100_000_000_000     # default 1e11

options:
  max_cloud_cover: 50             # 0..100 (uses S2 metadata if applicable)
  csplus_band: cs                 # options: cs, cs_cdf
  cs_plus_threshold: 0.70         # 0.0..1.0 (higher = stricter cloud removal)
  clip_min_max: true

version: "v02"                    # corresponds to current s2biophys version

# Landsat 8/9 Land Surface Temperature layer (optional).
# Remove this block to skip LST entirely.
landsat:
  start_date:                "2018-01-02"   # matches temporal.start
  end_date:                  "2024-01-01"   # matches temporal.end
  max_scene_cloud_cover:     30
  mask_water:                true
  min_cloud_distance_km:     1.0
  max_st_uncertainty_k:      3.0
  target_year:               2023           # most recent full summer in range
  baseline_start_year:       2018           # baseline = pre-planting (planting Apr 2022)
  baseline_end_year:         2021
  season_start_month:        5              # May–Aug summer window
  season_end_month:          9
  zscore_moderate_threshold: 1.5
  zscore_strong_threshold:   2.5
