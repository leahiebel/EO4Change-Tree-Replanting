<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EO4C Land Surface Temperature</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQvLx8U5sq7fVjsBQoXf+5myI1M3P4="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="map" aria-label="EO4C Land Surface Temperature map"></div>
    <aside id="panel">
      <h1>Land Surface Temperature</h1>
      <label for="opacity">Layer opacity</label>
      <input id="opacity" type="range" min="0" max="1" step="0.05" value="0.75" />
      <div id="legend"></div>
      <div id="status">Loading layers...</div>
    </aside>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
